<ng-template #userFormTemplate>
  <!-- Step Indicator -->
  <div class="steps-indicator">
    <div class="step" [class.active]="isStepActive(1)" [class.completed]="isStepCompleted(1)" (click)="setStep(1)">
      <div class="step-number">1</div>
      <div class="step-label">Basic Info</div>
    </div>
    <div class="step-connector" [class.completed]="isStepCompleted(1)"></div>
    <div class="step" [class.active]="isStepActive(2)" [class.completed]="isStepCompleted(2)" (click)="setStep(2)">
      <div class="step-number">2</div>
      <div class="step-label">Employment</div>
    </div>
    <div class="step-connector" [class.completed]="isStepCompleted(2)"></div>
    <div class="step" [class.active]="isStepActive(3)" [class.completed]="isStepCompleted(3)" (click)="setStep(3)">
      <div class="step-number">3</div>
      <div class="step-label">Permissions</div>
    </div>
    <div class="step-connector" [class.completed]="isStepCompleted(3)"></div>
    <div class="step" [class.active]="isStepActive(4)" (click)="setStep(4)">
      <div class="step-number">4</div>
      <div class="step-label">Additional</div>
    </div>
  </div>

  <div class="user-form-content">
    <!-- Tab 1: Basic Info -->
    <div *ngIf="isStepActive(1)" class="step-content" [formGroup]="basicInfoForm">
      <h3>Basic Information</h3>

      <div class="form-row">
        <app-input-text
          [config]="firstNameConfig"
          formControlName="firstName"
        ></app-input-text>

        <app-input-text
          [config]="lastNameConfig"
          formControlName="lastName"
        ></app-input-text>
      </div>

      <div class="form-row">
        <app-input-text
          [config]="emailConfig"
          formControlName="emailAddress"
        ></app-input-text>

        <app-input-text
          [config]="phoneConfig"
          formControlName="phoneNumber"
        ></app-input-text>
      </div>

      <app-input-text
        [config]="employeeIdConfig"
        formControlName="employeeId"
      ></app-input-text>
    </div>

    <!-- Tab 2: Employment -->
    <div *ngIf="isStepActive(2)" class="step-content" [formGroup]="employmentForm">
      <h3>Employment Details</h3>

      <div class="form-row">
        <div class="form-group">
          <app-input-dropdown
            [options]="roleOptions"
            [config]="roleDropdownConfig"
            [selectedId]="employmentForm.get('role')?.value"
            (selectionChanged)="onRoleChange($event)"
          ></app-input-dropdown>
        </div>

        <div class="form-group">
          <app-input-dropdown
            [options]="departmentOptions"
            [config]="departmentDropdownConfig"
            [selectedId]="employmentForm.get('department')?.value"
            (selectionChanged)="onDepartmentChange($event)"
          ></app-input-dropdown>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <app-input-dropdown
            [options]="branchOptions"
            [config]="branchDropdownConfig"
            [selectedId]="employmentForm.get('branchAssignment')?.value"
            (selectionChanged)="onBranchChange($event)"
          ></app-input-dropdown>
        </div>

        <app-input-text
          [config]="startDateConfig"
          formControlName="startDate"
        ></app-input-text>
      </div>
    </div>

    <!-- Tab 3: Permissions -->
    <div *ngIf="isStepActive(3)" class="step-content">
      <h3>System Permissions</h3>

      <div class="permissions-container">
        <div class="permission-column">
          <h5>Core Modules</h5>
          <div class="permission-list">
            <div *ngFor="let perm of getPermissionsByCategory('core')" class="permission-checkbox-item">
              <input
                type="checkbox"
                [id]="perm.id"
                [checked]="isPermissionSelected(perm.id)"
                (change)="togglePermission(perm.id)"
              />
              <label [for]="perm.id">{{ perm.name }}</label>
            </div>
          </div>
        </div>

        <div class="permission-column">
          <h5>Administration</h5>
          <div class="permission-list">
            <div *ngFor="let perm of getPermissionsByCategory('admin')" class="permission-checkbox-item">
              <input
                type="checkbox"
                [id]="perm.id"
                [checked]="isPermissionSelected(perm.id)"
                (change)="togglePermission(perm.id)"
              />
              <label [for]="perm.id">{{ perm.name }}</label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tab 4: Additional -->
    <div *ngIf="isStepActive(4)" class="step-content" [formGroup]="additionalForm">
      <h3>Additional Information</h3>

      <app-input-text
        [config]="profilePicUrlConfig"
        formControlName="profilePictureUrl"
      ></app-input-text>

      <app-input-text
        [config]="additionalNotesConfig"
        formControlName="additionalNotes"
      ></app-input-text>

      <div class="checkbox-group">
        <input
          type="checkbox"
          id="accountActive"
          formControlName="accountActive"
        />
        <label for="accountActive">Account is active</label>
      </div>
    </div>
  </div>
</ng-template>
